<div class="music-horizontal">
  <p class="music-title">
    {{ currentTrack.title }} – <span class="music-artist">{{ currentTrack.artist }}</span>
  </p>

  <div class="music-controls">
    <button (click)="prevTrack()">⏮</button>
    <button (click)="togglePlay()">{{ playing ? '❚❚' : '▶' }}</button>
    <button (click)="nextTrack()">⏭</button>
  </div>

  <div class="music-progress">
    <div class="bar">
      <div class="bar-fill" [style.width]="progressWidth"></div>
    </div>
    <div class="time">
      {{ formatTime(currentTime) }} / {{ formatTime(duration) }}
    </div>
  </div>

  <audio #audioPlayer
         [src]="currentTrack.src"
         (timeupdate)="onTimeUpdate()"
         (ended)="onEnded()">
  </audio>
</div>
