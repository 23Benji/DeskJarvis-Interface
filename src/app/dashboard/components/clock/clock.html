<div class="clock-widget">
  <div class="menu-bar">
    <!-- Added stopPropagation so clicking inside the menu doesn't close it -->
    <div class="dropdown-menu" *ngIf="menuOpen" (click)="$event.stopPropagation()">
      <button *ngFor="let tab of ['clock', 'stopwatch', 'timer', 'pomodoro']"
              (click)="switchTab(tab)"
              [class.active]="activeTab === tab">
        {{ tab | titlecase }}
      </button>
    </div>
  </div>

  <div class="clock-display">
    <!-- Pass $event to toggleMenu -->
    <button class="menu-icon" (click)="toggleMenu($event)">
      <lucide-icon [img]="MenuIcon" size="30"></lucide-icon>
    </button>

    <div *ngIf="activeTab === 'clock'">
      {{ formattedTime }}
    </div>

    <div *ngIf="activeTab === 'stopwatch'">
      <div>{{ formatTime(stopwatch) }}</div>
      <div class="button-row">
        <button (click)="toggleRunning()">{{ running ? 'Pause' : 'Start' }}</button>
        <button (click)="resetStopwatch()">Reset</button>
      </div>
    </div>
    <div *ngIf="activeTab === 'timer'">
      <div>{{ formatTime(timer) }}</div>

      <!-- NEW: Specific container for preset times -->
      <div class="preset-grid">
        <button *ngFor="let sec of [30, 60, 300, 600, 900]" (click)="setTimer(sec)">
          {{ sec < 60 ? sec + 's' : (sec / 60) + 'm' }}
        </button>
      </div>

      <!-- NEW: Specific container for actions -->
      <div class="action-row">
        <button (click)="toggleRunning()">{{ running ? 'Pause' : 'Start' }}</button>
        <button (click)="resetTimer()">Reset</button>
      </div>
    </div>

    <div *ngIf="activeTab === 'pomodoro'">
      <div>{{ formatTime(pomodoro) }}</div>
      <div class="button-row">
        <button (click)="toggleRunning()">{{ running ? 'Pause' : 'Start' }}</button>
        <button (click)="resetPomodoro()">Reset</button>
      </div>
    </div>

  </div>
</div>
