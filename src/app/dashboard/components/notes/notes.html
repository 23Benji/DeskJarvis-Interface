<div class="notes-widget">
  <div class="notes-container">
    <ul>
      <li *ngFor="let note of notes">
        <strong style="color: white; display: block; margin-bottom: 4px;">
          {{ note.title }}
        </strong>

        <span style="color: #aaa;">{{ note.description }}</span>
      </li>
    </ul>
  </div>
</div>
