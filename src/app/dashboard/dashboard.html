<a routerLink="/" class="home-btn" title="Back to System">
  <lucide-icon [img]="Icons['home']" size="24"></lucide-icon>
</a>
<div class="dashboard">

  <div class="ai-center">
    <app-ai-widget></app-ai-widget>
  </div>

  <div *ngIf="widgets['clock']" class="widget" cdkDrag [cdkDragFreeDragPosition]="positions['clock'] || {x: 0, y: 0}"
    (cdkDragMoved)="onDragMoved($event)" (cdkDragEnded)="onDragEnded($event, 'clock')"
    style="position: absolute; top: 5%; left: 35%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-clock></app-clock>
  </div>

  <div *ngIf="widgets['weather']" class="widget" cdkDrag
    [cdkDragFreeDragPosition]="positions['weather'] || {x: 0, y: 0}" (cdkDragMoved)="onDragMoved($event)"
    (cdkDragEnded)="onDragEnded($event, 'weather')" style="position: absolute; top: 15%; right: 7%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-weather></app-weather>
  </div>

  <div *ngIf="widgets['calendar']" class="widget" cdkDrag
    [cdkDragFreeDragPosition]="positions['calendar'] || {x: 0, y: 0}" (cdkDragMoved)="onDragMoved($event)"
    (cdkDragEnded)="onDragEnded($event, 'calendar')" style="position: absolute; bottom: 5%; left: 5%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-calendar></app-calendar>
  </div>

  <div *ngIf="widgets['notes']" class="widget" cdkDrag [cdkDragFreeDragPosition]="positions['notes'] || {x: 0, y: 0}"
    (cdkDragMoved)="onDragMoved($event)" (cdkDragEnded)="onDragEnded($event, 'notes')"
    style="position: absolute; top: 10%; left: 5%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-notes></app-notes>
  </div>

  <div *ngIf="widgets['music']" class="widget" cdkDrag [cdkDragFreeDragPosition]="positions['music'] || {x: 0, y: 0}"
    (cdkDragMoved)="onDragMoved($event)" (cdkDragEnded)="onDragEnded($event, 'music')"
    style="position: absolute; bottom: 5%; right: 35%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-music-player></app-music-player>
  </div>

  <div *ngIf="widgets['image']" class="widget" cdkDrag [cdkDragFreeDragPosition]="positions['image'] || {x: 0, y: 0}"
    (cdkDragMoved)="onDragMoved($event)" (cdkDragEnded)="onDragEnded($event, 'image')"
    style="position: absolute; top: 50%; left: 70%;">
    <div class="drag-handle" cdkDragHandle></div>
    <app-resizable-image-widget></app-resizable-image-widget>
  </div>
</div>

<div class="toolbox" [class.visible]="toolboxVisible" [class.trash-hover]="isTrashHovered">
  <button *ngIf="!widgets['clock']" class="tool-btn" (click)="showWidget('clock')" title="Clock">
    <lucide-icon [img]="Icons['clock']" size="24"></lucide-icon>
  </button>
  <button *ngIf="!widgets['weather']" class="tool-btn" (click)="showWidget('weather')" title="Weather">
    <lucide-icon [img]="Icons['weather']" size="24"></lucide-icon>
  </button>
  <button *ngIf="!widgets['calendar']" class="tool-btn" (click)="showWidget('calendar')" title="Calendar">
    <lucide-icon [img]="Icons['calendar']" size="24"></lucide-icon>
  </button>
  <button *ngIf="!widgets['notes']" class="tool-btn" (click)="showWidget('notes')" title="Notes">
    <lucide-icon [img]="Icons['notes']" size="24"></lucide-icon>
  </button>
  <button *ngIf="!widgets['music']" class="tool-btn" (click)="showWidget('music')" title="Music Player">
    <lucide-icon [img]="Icons['music']" size="24"></lucide-icon>
  </button>
  <button *ngIf="!widgets['image']" class="tool-btn" (click)="showWidget('image')" title="Image">
    <lucide-icon [img]="Icons['image']" size="24"></lucide-icon>
  </button>
</div>
