<div class="home-container">

  <a routerLink="/home" class="home-btn" title="Back to System">
    <lucide-icon [img]="Icons.home" size="24"></lucide-icon>
  </a>

  <img src="/assets/images/GamesHub.svg" alt="Games Hub" class="games-logo">

  <p class="system-subtitle">Select a game to play</p>

  <div class="menu-grid">
    <a routerLink="/games/duck-hunt" class="menu-card">
      <lucide-icon [img]="Icons.duck" size="80"></lucide-icon>
      <span>Duck Hunt</span>
    </a>

    <a routerLink="/games/tetris" class="menu-card">
      <lucide-icon [img]="Icons.tetris" size="80"></lucide-icon>
      <span>Tetris</span>
    </a>

    <a routerLink="/games/snake" class="menu-card">
      <lucide-icon [img]="Icons.snake" size="80"></lucide-icon>
      <span>Snake</span>
    </a>

    <a routerLink="/games/pacman" class="menu-card">
      <lucide-icon [img]="Icons.pacman" size="80"></lucide-icon>
      <span>Pac-Man</span>
    </a>
  </div>
</div>
