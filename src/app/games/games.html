<div class="home-container">

  <!-- Keep Home button as SPA navigation (optional, or change to href if you want that to refresh too) -->
  <a routerLink="/home" class="home-btn" title="Back to System">
    <lucide-icon [img]="Icons.home" size="24"></lucide-icon>
  </a>

  <img src="/assets/images/GamesHub.svg" alt="Games Hub" class="games-logo">

  <p class="system-subtitle">Select a game to play</p>

  <div class="menu-grid">
    <!-- 🟢 CHANGED: routerLink -> href (Forces Reload) -->
    <a href="/games/duck" class="menu-card">
      <lucide-icon [img]="Icons.duck" size="80"></lucide-icon>
      <span>Duck Hunt</span>
    </a>

    <!-- 🟢 CHANGED: routerLink -> href (Forces Reload) -->
    <a href="/games/tetris" class="menu-card">
      <lucide-icon [img]="Icons.tetris" size="80"></lucide-icon>
      <span>Tetris</span>
    </a>

    <!-- 🟢 CHANGED: routerLink -> href (Forces Reload) -->
    <a href="/games/pong" class="menu-card">
      <lucide-icon [img]="Icons.pong" size="80"></lucide-icon>
      <span>Pong</span>
    </a>
  </div>
</div>
