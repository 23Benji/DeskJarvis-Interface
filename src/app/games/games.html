  <div class="menu-grid">
    <a routerLink="/games/duck-hunt" class="menu-card">
      <lucide-icon [img]="Icons.duck" size="48"></lucide-icon>
      <span>Duck Hunt</span>
    </a>

    <a routerLink="/games/tetris" class="menu-card">
      <lucide-icon [img]="Icons.tetris" size="48"></lucide-icon>

    <a routerLink="/games/snake" class="menu-card">
      <lucide-icon [img]="Icons.snake" size="48"></lucide-icon>

    </a>

    <a routerLink="/games/pacman" class="menu-card">
      <lucide-icon [img]="Icons.pacman" size="48"></lucide-icon>
      <span>Pac-Man</span>
    </a>
