<div class="settings-container">
  <a routerLink="/" class="home-btn">
    <lucide-icon [img]="HomeIcon" size="24"></lucide-icon>
  </a>

  <h1>System Settings</h1>

  <div class="settings-panel">
    <div class="setting-item">
      <span>Theme</span>
      <button class="toggle-btn">Dark Mode</button>
    </div>
    <div class="setting-item">
      <span>Sound Effects</span>
      <button class="toggle-btn">On</button>
    </div>
    <div class="setting-item">
      <span>Version</span>
      <span>v2.0 (Angular)</span>
    </div>
  </div>
</div>
