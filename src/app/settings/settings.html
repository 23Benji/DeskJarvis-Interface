<div class="settings-container">
  <a routerLink="/" class="home-btn">
    <lucide-icon [img]="Icons.HomeIcon" size="24"></lucide-icon>
  </a>

  <h1>System Settings</h1>


  <div class="settings-panel">
    <div class="setting-item">
      <span>System Guide</span>
      <a routerLink="/tutorial" class="toggle-btn" style="text-decoration: none; display: flex; align-items: center; gap: 5px;">
        <lucide-icon [img]="Icons.HelpIcon" size="16"></lucide-icon>
        Tutorial
      </a>
    </div>

    <div class="setting-item">
      <span>Github(DeskJarvis)</span>
      <span><a class="toggle-btn"
        style="text-decoration: none; display: flex; align-items: center; gap: 5px;"
        href="https://github.com/23Benji/desk-jarvis-ang" target="_blank">Take a look !</a></span>
    </div>
    <div class="setting-item">
      <span>Github(HandTracking)</span>
      <span><a class="toggle-btn"
        style="text-decoration: none; display: flex; align-items: center; gap: 5px;"
        href="https://github.com/mp3skater/AR-Hand-Tracker-Mouse" target="_blank">Try it out</a></span>
    </div>
    <div class="setting-item">
      <span>Version</span>
      <span>v2.0 (Angular)</span>
    </div>
  </div>
</div>
